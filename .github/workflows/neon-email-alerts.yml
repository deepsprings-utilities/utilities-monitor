name: Neon email alerts

# Portable freshness alerts: Neon SQL → Resend (does not depend on Grafana alerting).
on:
  schedule:
    # Hourly at :35 UTC (adjust if you prefer alignment with ingest).
    - cron: "35 * * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: neon-loader
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      ALERT_STALE_AFTER_MINUTES: ${{ vars.ALERT_STALE_AFTER_MINUTES }}
      ALERT_COOLDOWN_MINUTES: ${{ vars.ALERT_COOLDOWN_MINUTES }}
      ALERT_HYDRO_MIN_KW: ${{ vars.ALERT_HYDRO_MIN_KW }}
      ALERT_HYDRO_RECENT_MINUTES: ${{ vars.ALERT_HYDRO_RECENT_MINUTES }}
      ALERT_ALARM_LOOKBACK_MINUTES: ${{ vars.ALERT_ALARM_LOOKBACK_MINUTES }}
      ALERT_ALARM_ROW_LIMIT: ${{ vars.ALERT_ALARM_ROW_LIMIT }}
      # Set to 1 for one manual run to send a test email via Resend (remove after).
      NOTIFY_SEND_TEST: ${{ secrets.NOTIFY_SEND_TEST }}
      # Set to 1 once to bypass cooldown if firing=true but dedupe blocked (remove after).
      NOTIFY_FORCE_SEND: ${{ secrets.NOTIFY_FORCE_SEND }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: neon-loader/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Notify (Resend)
        run: npm run notify:email-alerts
