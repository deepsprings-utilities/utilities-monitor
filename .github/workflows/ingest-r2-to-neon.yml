name: Ingest R2 to Neon

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: neon-loader
    env:
      # R2 keys: pass repository Secrets straight into env (reliable). Do not rely only on a merge step.
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      # Account id: Secret or Variable (different GitHub tabs) — merged in the step below.
      _CF_ACCOUNT_ID_FROM_SECRET: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      _CF_ACCOUNT_ID_FROM_VAR: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      # Optional: Variables-only R2 keys if secrets are empty (name must match exactly).
      _CF_R2_AKI_VAR: ${{ vars.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      _CF_R2_SAK_VAR: ${{ vars.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      INGEST_PREFIX: ${{ vars.INGEST_PREFIX || 'log-gz/' }}
      INGEST_BATCH_LIMIT: ${{ vars.INGEST_BATCH_LIMIT || '200' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Merge CLOUDFLARE_ACCOUNT_ID; optional R2 var fallback
        working-directory: ${{ github.workspace }}
        run: |
          pick_two() {
            s="$(printf '%s' "$1" | tr -d ' \n\r\t')"
            v="$(printf '%s' "$2" | tr -d ' \n\r\t')"
            if [ -n "$s" ]; then printf '%s' "$s"
            elif [ -n "$v" ]; then printf '%s' "$v"
            fi
          }
          acct="$(pick_two "${_CF_ACCOUNT_ID_FROM_SECRET}" "${_CF_ACCOUNT_ID_FROM_VAR}")"
          if [ -n "$acct" ]; then
            printf '%s\n' "CLOUDFLARE_ACCOUNT_ID=${acct}" >> "$GITHUB_ENV"
          fi
          # If secrets did not inject R2 keys, try Variables (same names under the Variables tab).
          if [ -z "${CLOUDFLARE_R2_ACCESS_KEY_ID}" ]; then
            v="$(printf '%s' "${_CF_R2_AKI_VAR}" | tr -d ' \n\r\t')"
            [ -n "$v" ] && printf 'CLOUDFLARE_R2_ACCESS_KEY_ID=%s\n' "$v" >> "$GITHUB_ENV"
          fi
          if [ -z "${CLOUDFLARE_R2_SECRET_ACCESS_KEY}" ]; then
            v="$(printf '%s' "${_CF_R2_SAK_VAR}" | tr -d ' \n\r\t')"
            [ -n "$v" ] && printf 'CLOUDFLARE_R2_SECRET_ACCESS_KEY=%s\n' "$v" >> "$GITHUB_ENV"
          fi
          echo "len_acct secret=${#_CF_ACCOUNT_ID_FROM_SECRET} var=${#_CF_ACCOUNT_ID_FROM_VAR}"
          echo "len_r2_key from_secrets=${#CLOUDFLARE_R2_ACCESS_KEY_ID} var_tab=${#_CF_R2_AKI_VAR} (GITHUB_ENV fallback applies to later steps only)"
          echo "len_r2_secret from_secrets=${#CLOUDFLARE_R2_SECRET_ACCESS_KEY} var_tab=${#_CF_R2_SAK_VAR}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: neon-loader/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      # Job env + GITHUB_ENV merges apply here — fail before ingest with a clear hint.
      - name: Validate R2 credentials for neon-loader
        run: |
          len_aki=${#CLOUDFLARE_R2_ACCESS_KEY_ID}
          len_sak=${#CLOUDFLARE_R2_SECRET_ACCESS_KEY}
          echo "len_CLOUDFLARE_R2_ACCESS_KEY_ID=${len_aki} len_CLOUDFLARE_R2_SECRET_ACCESS_KEY=${len_sak}"
          if [ "${len_aki}" -eq 0 ]; then
            echo "::error::CLOUDFLARE_R2_ACCESS_KEY_ID is empty after merge. In the repo → Settings → Secrets and variables → Actions → Secrets: add CLOUDFLARE_R2_ACCESS_KEY_ID (Cloudflare Dashboard → R2 → Manage R2 API Tokens — Access Key ID). Name must match exactly; do not put only the Secret Access Key."
            exit 1
          fi
          if [ "${len_sak}" -eq 0 ]; then
            echo "::error::CLOUDFLARE_R2_SECRET_ACCESS_KEY is empty. Add the paired Secret Access Key as a repository Secret with that exact name."
            exit 1
          fi

      - name: Run ingestion
        run: npm run ingest
