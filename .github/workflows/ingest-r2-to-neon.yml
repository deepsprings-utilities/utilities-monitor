name: Ingest R2 to Neon

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: neon-loader
    env:
      # Avoid `${{ secrets || vars }}` — merge in shell (see Merge step below).
      _CF_ACCOUNT_ID_FROM_SECRET: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      _CF_ACCOUNT_ID_FROM_VAR: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      INGEST_PREFIX: ${{ vars.INGEST_PREFIX || 'log-gz/' }}
      INGEST_BATCH_LIMIT: ${{ vars.INGEST_BATCH_LIMIT || '200' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Merge CLOUDFLARE_ACCOUNT_ID (secret or variable)
        working-directory: ${{ github.workspace }}
        run: |
          s="$(printf '%s' "${_CF_ACCOUNT_ID_FROM_SECRET}" | tr -d ' \n\r\t')"
          v="$(printf '%s' "${_CF_ACCOUNT_ID_FROM_VAR}" | tr -d ' \n\r\t')"
          if [ -n "$s" ]; then echo "CLOUDFLARE_ACCOUNT_ID=$s" >> "$GITHUB_ENV"
          elif [ -n "$v" ]; then echo "CLOUDFLARE_ACCOUNT_ID=$v" >> "$GITHUB_ENV"
          fi
          echo "len_secret=${#s} len_var=${#v} (diagnostic; 0 means GitHub did not inject)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: neon-loader/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Run ingestion
        run: npm run ingest
