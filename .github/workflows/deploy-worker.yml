name: Deploy Cloudflare Worker

on:
    push:
        branches: [main, acquisuite-ingest]

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        defaults:
            run:
                working-directory: worker
        env:
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: worker/package-lock.json

            - name: Install dependencies
              run: npm ci

            # Fail with a clear message if secrets are missing (empty string = wrong name, org access, or fork PR).
            - name: Check Cloudflare secrets
              run: |
                  if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
                    echo "::error::CLOUDFLARE_API_TOKEN is empty. Add a repository Actions secret named exactly CLOUDFLARE_API_TOKEN (Settings → Secrets and variables → Actions). Not an Environment secret unless this job sets environment:."
                    exit 1
                  fi
                  if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
                    echo "::error::CLOUDFLARE_ACCOUNT_ID is empty. Add repository secret CLOUDFLARE_ACCOUNT_ID (32-char hex id from Cloudflare dashboard)."
                    exit 1
                  fi
                  echo "Cloudflare env vars are set (values not shown)."

            - name: Deploy
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: npx wrangler deploy
