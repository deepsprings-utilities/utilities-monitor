name: Deploy Cloudflare Worker

on:
    push:
        branches: [main, acquisuite-ingest]
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        defaults:
            run:
                working-directory: worker
        # Pass secrets/vars separately; bash merges account id (avoid `${{ secrets || vars }}` quirks).
        # Wrangler reads CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID from the environment.
        env:
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            _CF_ACCOUNT_ID_FROM_SECRET: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            _CF_ACCOUNT_ID_FROM_VAR: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: worker/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Credential diagnostics (lengths only)
              run: |
                  echo "repo=${{ github.repository }} event=${{ github.event_name }} ref=${{ github.ref }}"
                  echo "len_secret_CLOUDFLARE_API_TOKEN=${#CLOUDFLARE_API_TOKEN}"
                  echo "len_secret_CLOUDFLARE_ACCOUNT_ID=${#_CF_ACCOUNT_ID_FROM_SECRET}"
                  echo "len_var_CLOUDFLARE_ACCOUNT_ID=${#_CF_ACCOUNT_ID_FROM_VAR}"
                  echo "If lengths are 0, add repository Secrets/Variables (CLOUDFLARE_*), or set jobs.deploy.environment for environment-scoped secrets."

            - name: Check Cloudflare credentials
              run: |
                  set -e
                  merge_account_id() {
                    trim() { printf '%s' "$1" | tr -d ' \n\r\t'; }
                    local s="$(trim "${_CF_ACCOUNT_ID_FROM_SECRET}")"
                    local v="$(trim "${_CF_ACCOUNT_ID_FROM_VAR}")"
                    if [ -n "${s}" ]; then printf '%s' "${s}"; elif [ -n "${v}" ]; then printf '%s' "${v}"; fi
                  }
                  TOKEN="$(printf '%s' "${CLOUDFLARE_API_TOKEN}" | tr -d '\n\r')"
                  ACCT="$(merge_account_id)"
                  if [ -z "${TOKEN}" ]; then
                    echo "::error::CLOUDFLARE_API_TOKEN is empty. Add repository Actions **Secret** named exactly CLOUDFLARE_API_TOKEN."
                    exit 1
                  fi
                  if [ -z "${ACCT}" ]; then
                    if grep -qE '^[[:space:]]*"account_id"[[:space:]]*:[[:space:]]*"[a-fA-F0-9]{32}"' wrangler.jsonc; then
                      echo "No CLOUDFLARE_ACCOUNT_ID in GitHub; using account_id from wrangler.jsonc."
                    else
                      echo "::error::No account id. Add Secret or Variable **CLOUDFLARE_ACCOUNT_ID** (32 hex), or job **environment:** for environment-scoped secrets, or \"account_id\" in worker/wrangler.jsonc."
                      exit 1
                    fi
                  elif ! printf '%s' "${ACCT}" | grep -qE '^[a-fA-F0-9]{32}$'; then
                    echo "::error::CLOUDFLARE_ACCOUNT_ID must be exactly 32 hex characters after trim. Got length ${#ACCT}."
                    exit 1
                  else
                    echo "CLOUDFLARE_ACCOUNT_ID format OK."
                  fi

            - name: Deploy
              run: |
                  merge_account_id() {
                    trim() { printf '%s' "$1" | tr -d ' \n\r\t'; }
                    local s="$(trim "${_CF_ACCOUNT_ID_FROM_SECRET}")"
                    local v="$(trim "${_CF_ACCOUNT_ID_FROM_VAR}")"
                    if [ -n "${s}" ]; then printf '%s' "${s}"; elif [ -n "${v}" ]; then printf '%s' "${v}"; fi
                  }
                  export CLOUDFLARE_API_TOKEN="$(printf '%s' "${CLOUDFLARE_API_TOKEN}" | tr -d '\n\r')"
                  ACCT="$(merge_account_id)"
                  if [ -n "${ACCT}" ]; then export CLOUDFLARE_ACCOUNT_ID="${ACCT}"; else unset CLOUDFLARE_ACCOUNT_ID; fi
                  npx wrangler deploy
